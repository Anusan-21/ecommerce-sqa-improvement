name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Client
      - working-directory: src/client
        run: npm ci

      - working-directory: src/client
        run: npm test

      - working-directory: src/client
        run: npm run build

      # Server
      - working-directory: src/server
        run: npm ci

      - working-directory: src/server
        run: npm test

      - working-directory: src/server
        run: npm run build


  e2e:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    container: cypress/included:15.11.0
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ss_ecommerce
        ports:
          - 5432:5432

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          cd src/server && npm ci && npm run build
          cd ../client && npm ci && npm run build
          cd ../../

      - name: Start app and run Cypress
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ss_ecommerce
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NEXT_PUBLIC_API_URL: http://localhost:5000
          HOST: 0.0.0.0
          PORT: 5000
          CYPRESS_baseUrl: http://localhost:3000
        run: |
          set -e

          echo "Starting server..."
          (cd src/server && npm run start) &
          SERVER_PID=$!

          echo "Starting client..."
          (cd src/client && npm run start -- -p 3000 -H 0.0.0.0) &
          CLIENT_PID=$!

          echo "Waiting for frontend..."
          npx wait-on --timeout 180000 http://localhost:3000

          echo "Running Cypress..."
          npx cypress run --browser electron --headless

          echo "Stopping background processes..."
          kill $SERVER_PID || true
          kill $CLIENT_PID || true

      - name: Show logs on failure
        if: failure()
        run: |
          echo "==== SERVER LOGS ===="
          ps aux | grep node || true